_jinja_extensions:
  - copier_template_extensions.TemplateExtensionLoader
  - extensions.py:SlugifyExtension
  - extensions.py:GitExtension
  - extensions.py:GlobalExtension

_exclude:
    - copier.yml
    - extensions.py
    - .git
    - .git/**
    - __pycache__
    - __pycache__/**
    - .ruff_cache
    - .venv
    - uv.lock
    

_tasks:
  - command: git init
    when: "{{ _copier_operation == 'copy' }}"
  - command: git add .
    when: "{{ _copier_operation == 'copy' }}"
  - command: git commit -m "Initial commit"
    when: "{{ _copier_operation == 'copy' }}"
  - command: uv venv .venv --python {{python_version}}
    when: "{{ _copier_operation == 'copy' }}"
  - command: uv sync --all-groups

# =============================================================================
# Project Basics
# =============================================================================

project_name:
  type: str
  help: "Project name (human-readable)"
  validator: >-
    {% if not project_name %}
    Project name is required.
    {% endif %}

project_description:
  type: str
  help: "Short project description"
  default: "Short project description"

project_version:
  type: str
  help: "Project version"
  default: "{{ default_package_version }}"

project_slug:
  type: str
  help: "Python package name (used for imports)"
  default: "{{ project_name | slugify | replace('-', '_') }}"
  validator: >-
    {% if not project_slug | regex_search('^[a-z][a-z0-9_]*$') %}
    Package name must start with a letter and contain only lowercase letters, numbers, and underscores.
    {% endif %}


# =============================================================================
# Author Information
# =============================================================================

author_name:
  type: str
  help: "Author's full name"
  default: "{{ 'git config user.name' | git_config }}"


python_version:
  type: str
  help: "Default Python version"
  choices:
    - "3.11"
    - "3.12"
    - "3.13"
  default: "3.11"